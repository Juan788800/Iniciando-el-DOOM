<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Mensajes - Ejercicio DOM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Encabezado principal -->
        <header class="header">
            <h1 class="header__title">Búsqueda de usuarios y registro de tareas</h1>
            <p class="header__subtitle">Busque su usuario y agregue las tareas necesarias</p>
        </header>

        <!-- Formulario de búsqueda de usuarios -->
        <section class="form-section">
            <div class="card">
                <h2 class="card__title">Búsqueda de usuarios</h2>
                
                <form id="userForm" class="form" novalidate>
                    <div class="form__group">
                        <label for="userDoc" class="form__label">
                            ingrese el documento del usuario
                        </label>
                        <input 
                            type="text" 
                            id="userDoc" 
                            class="form__input" 
                            placeholder="Ingresa el documento del usuario"
                            aria-required="true"
                        >
                        <span class="form__error" id="userDocError"></span>
                    </div>
                    <button type="submit" class="btn btn--primary" id="submitBtn">
                        <span class="btn__text">Buscar Usuario</span>
                        <span class="btn__icon">➤</span>
                    </button>
                </form>
            </div>
        </section>

        <!-- Formulario para agregar tareas -->
        <section id="tareaFormContainer" class="formulario-oculto formulario-tarea">
            <form id="tareaForm">
                <h3>Nueva tarea</h3>
                <input type="text" id="tareaInputTitulo" placeholder="Título" class="inputTarea">
                <input type="text" id="tareaInputDescripcion" placeholder="Describa la tarea" class="inputTarea">
                <button type="submit" class="botonEnviar">
                    <span>Guardar Tarea</span>
                    <span class="btn__icon">➤</span>
                </button>
            </form>
        </section>

        <!-- Área de tareas -->
        <section class="tareas-section">
            <div class="tareas-header">
                <h2 class="tareas-header__title">Tareas asignadas</h2>
                <span class="tareas-header__count" id="tareaCount">0 tareas</span>
            </div>

            <div id="tareasContainer" class="tareas-container">
                <!-- Las tareas se agregarán aquí dinámicamente -->
                <div class="tareas-empty" id="emptyState">
                    <svg class="tareas-empty__icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <p class="tareas-empty__text">Aún no hay tareas asignadas</p>
                    <p class="tareas-empty__subtext">Completa el formulario para agregar tu primera tarea</p>
                </div>
            </div>
        </section>

        <!-- Footer informativo -->
        <footer class="footer">
            <p class="footer__text">Ejercicio de manipulación del DOM | SENA - Desarrollo Web</p>
        </footer>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
